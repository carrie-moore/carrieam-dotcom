<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrie Moore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Coustard&family=Playwrite+US+Trad&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Video background -->
  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="lookout-compressed.mp4" type="video/mp4" />
    </video>
  </div>

  <!--
    Sage green overlay.
    viewBox is 1600×900 (16:9).
    The cowgirl silhouette is used as a mask — the figure shape
    punches through the overlay so the video shows through it.
    cowgirl_mask.svg viewBox is 64×80; scaled ×10 and centered
    gives 640×800, offset to (480, 50) on the 1600×900 canvas.
  -->
  <svg
    class="overlay"
    viewBox="0 0 1600 900"
    preserveAspectRatio="xMidYMid slice"
    xmlns="http://www.w3.org/2000/svg"
    aria-hidden="true"
  >
    <defs>
      <radialGradient id="vignette-grad" cx="50%" cy="50%" r="65%">
        <stop offset="0%"   stop-color="#14231a" stop-opacity="0" />
        <stop offset="100%" stop-color="#14231a" stop-opacity="0.72" />
      </radialGradient>

      <!--
        Path data defined once here, referenced by both breakpoint groups
        below via <use> to avoid duplication.
      -->
      <g id="cowgirl-paths">
        <path d="M45.463,28.06c-1.536-.8-3.928.076-5.469.823l-.554-.271a1,1,0,1,0-.88,1.8l1,.49a1,1,0,0,0,.9-.011,12.68,12.68,0,0,1,2.118-.882,1.83,1.83,0,0,0-.066.468,1.269,1.269,0,1,0,2.486,0,1.819,1.819,0,0,0-.081-.529,1,1,0,0,0,.544-1.884Z" fill="black" />
        <path d="M61.791,16.148c-.757-2.121-3.14-2.731-4.494-2.906a10.427,10.427,0,0,0-3.026.25A29.15,29.15,0,0,0,48.154,15.4l-.672.289L45.06,9.4c-.12-.311-.242-.648-.368-1-.985-2.735-2.631-7.31-7-6.249L12.673,8.239a5,5,0,0,0-3.83,5.126c.061,1.767.225,3.556.385,5.286q.111,1.22.207,2.433a17.731,17.731,0,0,0-6.09,6.794c-1.345,2.7-1.519,5.306-.49,7.346.654,1.3,2.109,2.959,5.326,3.523a11.107,11.107,0,0,0,1.76.1c1.442,0,3.265-.12,4.648-.231C12.135,46.313,6.588,58.836,8,62H43V61h-.01a.989.989,0,0,0-.326-.748l-4.9-4.342.122-.727a.987.987,0,0,0-.237-.8l2.278-3.019c.6.2,1.179.37,1.751.5a4.826,4.826,0,0,0,4.226-.9c2.362-1.886,3.029-5.728,3.132-7.007l.87-1.44a1,1,0,0,0,.023-1l-.415-.763,1.829-.561a1,1,0,0,0,.647-1.3l-2.969-8.185a4.825,4.825,0,0,1,.426-1.145,6.262,6.262,0,0,0,.495-1.31,17.394,17.394,0,0,0-.542-5.607q2.72-.335,5.448-.621c2.255-.239,5.021-.479,6.462-2.484A3.745,3.745,0,0,0,61.791,16.148ZM13.9,11.025a74.515,74.515,0,0,0,11.8-.98c4.78-.956,11.631-4.849,11.7-4.888A1,1,0,0,1,38.4,6.893c-.292.167-7.2,4.093-12.3,5.113a74.965,74.965,0,0,1-12.2,1.019,1,1,0,0,1,0-2Zm1.3,25.537a41.9,41.9,0,0,1-6.672.216,5.044,5.044,0,0,1-3.886-2.455c-.738-1.462-.562-3.434.494-5.552C10.662,17.691,27.9,17.643,33.055,17.9a30.447,30.447,0,0,1,7.85,1.582c1.312.392,2.669.8,4.243,1.167.431.1.867.21,1.306.319C18.725,24.821,13.81,33.919,13.6,34.339a1,1,0,0,0,.892,1.444,1.007,1.007,0,0,0,.89-.536c.05-.092.124-.176.182-.266Q15.432,35.694,15.2,36.562ZM35.108,59.7l-5.024-1.655a4.629,4.629,0,0,0,.079-.595l.138-3.842,5.48,2.055ZM49.754,38.585,47.76,39.2a1,1,0,0,0-.585,1.434l.725,1.334-.411.681H46.462a1,1,0,0,0,0,2h.476c-.247,1.391-.919,3.661-2.279,4.747a2.825,2.825,0,0,1-2.535.516,17.782,17.782,0,0,1-2.651-.838h0a33.049,33.049,0,0,1-3.012-1.4,1,1,0,0,0-1.4,1.228l1.367,3.778-.642.852L30.663,51.61a.991.991,0,0,0-.289-.046l.584-16.275c-1.253.263-2-.96-2.292-1.955-.359-1.221-.845-3.405.8-4.058s2.631,1.118,3.061,2.641l4.305-7.155c3.492-.8,7.026-1.383,10.581-1.858a17.233,17.233,0,0,1,.573,4.947,5.612,5.612,0,0,1-.352.876,3.868,3.868,0,0,0-.53,2.552Z" fill="black" />
      </g>

      <mask id="cowgirl-mask">
        <!-- white = sage green visible, black = transparent (video shows through) -->
        <rect width="1600" height="900" fill="white" />

        <!--
          Desktop/landscape: scale ×10 → 640×800, visually centered in 1600×900
          (paths run ~y2–62 in the 64×80 viewBox, so translateY=130 corrects for that).
          Mobile/portrait:   scale ×6  → 384×480, translateY=258 centers visually.
        -->
        <g class="cowgirl-desktop" transform="translate(480, 130) scale(10)">
          <use href="#cowgirl-paths" />
        </g>
        <g class="cowgirl-mobile" transform="translate(608, 258) scale(6)">
          <use href="#cowgirl-paths" />
        </g>
      </mask>
    </defs>

    <rect width="1600" height="900" fill="#6b8f72" mask="url(#cowgirl-mask)" />
    <rect width="1600" height="900" fill="url(#vignette-grad)" />
  </svg>

  <!-- Text content -->
  <div class="content">
    <div class="text-block">
      <p class="name">Carrie Moore</p>
      <p class="intro">Dipping my toes back into digital waters outside of my day job. It has been a long while. Stay tuned...</p>
    </div>

    <!-- Attribution: "cowgirl" icon by dDara from thenounproject.com CC BY 3.0 -->
    <footer class="footer">
      <p>© 2025 carrie moore. all rights reserved.</p>
      <p>"cowgirl" icon by <a href="https://thenounproject.com" target="_blank" rel="noopener">ddara / the noun project</a> — cc by 3.0</p>
    </footer>
  </div>

  <script>
    function positionCowgirl() {
      const desktopGroup = document.querySelector('.cowgirl-desktop');
      const mobileGroup  = document.querySelector('.cowgirl-mobile');
      const W = window.innerWidth;

      if (W >= 768) {
        // Center in viewport. The SVG canvas center is always Y=450 under
        // xMidYMid slice regardless of viewport size. Figure paths run ~y2–62
        // in the 64×80 viewBox, so visual center from origin = (2+62)/2 × scale.
        // translateY = 450 − visual_center_offset → 130 at ×10, 258 at ×6.
        desktopGroup.setAttribute('transform', 'translate(480, 130) scale(10)');
        mobileGroup.setAttribute('transform',  'translate(608, 258) scale(6)');
        return;
      }

      // Mobile (<768px): position 8px below the intro paragraph.
      const intro = document.querySelector('.intro');
      const introBottom = intro.getBoundingClientRect().bottom;
      const H = window.innerHeight;
      const sliceScale = Math.max(W / 1600, H / 900);
      const svgOffsetY  = (H - 900 * sliceScale) / 2;
      const targetSvgY  = (introBottom + 8 - svgOffsetY) / sliceScale;

      desktopGroup.setAttribute('transform', `translate(480, ${targetSvgY}) scale(10)`);
      mobileGroup.setAttribute('transform',  `translate(608, ${targetSvgY}) scale(6)`);
    }

    // Wait for fonts so the intro's rendered height is accurate, then rerun on resize.
    document.fonts.ready.then(positionCowgirl);
    window.addEventListener('resize', positionCowgirl);
  </script>
</body>
</html>
