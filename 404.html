  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f0ebe0;
    }

    .page {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2.75rem;
      gap: 1.25rem;
    }

    /* ── Lasso + 404 ── */
    .lasso-wrap {
      position: relative;
      width: clamp(220px, 36vw, 400px);
    }

    .lasso-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /*
      The lasso loop (oval) spans roughly y 26–125 in the 320-unit-tall viewBox.
      Its visual center sits at ≈ 23% from the top, 46% from the left.
      translate(-50%, -50%) centers the numeral on that point.
    */
    .four-oh-four {
      position: absolute;
      top: 22%;
      left: 45%;
      transform: translate(-50%, -50%);
      font-family: "Playwrite US Trad", cursive;
      font-optical-sizing: auto;
      font-weight: 400;
      font-size: clamp(1.5rem, 6.5vw, 3.5rem);
      color: #3a4a3e;
      white-space: nowrap;
      line-height: 1;
      padding-top: 0.4em; /* match index.html ascender allowance */
    }

    /* ── Message ── */
    .message {
      font-family: "Coustard", serif;
      font-size: 1rem;
      color: #3a4a3e;
    }

    /* ── Footer ── */
    .footer {
      position: absolute;
      bottom: 2.5rem;
      right: 2.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      font-family: "Coustard", serif;
      font-size: 0.65rem;
      color: #6b8f72;
      line-height: 1.4;
      text-align: right;
    }

    .footer a {
      color: inherit;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /*
      Animations only run when the user has not requested reduced motion.
      Elements are visible by default so they always show regardless of preference.
    */
    @media (prefers-reduced-motion: no-preference) {
      .lasso-wrap {
        opacity: 0;
        animation: reveal-up 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s;
      }

      .message {
        opacity: 0;
        animation: reveal-up 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s;
      }

      .footer {
        opacity: 0;
        animation: reveal-up 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 1.1s;
      }

      @keyframes reveal-up {
        from {
          clip-path: inset(100% 0 0 0);
          opacity: 0;
        }
        to {
          clip-path: inset(0% 0 0 0);
          opacity: 1;
        }
      }
    }
  </style>
</head>
